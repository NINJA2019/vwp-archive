<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.W.P ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Shippori+Mincho:wght@400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root { --bg:#07090e; --surface:#0c0f18; --surface2:#111420; --border:rgba(160,170,220,0.11); --text:#ccd4ee; --dim:#5a6a90; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 60% 35% at 5% 0%, rgba(100,120,255,0.05) 0%,transparent 70%),
              radial-gradient(ellipse 50% 25% at 95% 100%, rgba(180,120,255,0.04) 0%,transparent 70%); }
header { position:sticky; top:0; z-index:100; background:rgba(7,9,14,0.92); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); }
.header-inner { max-width:1480px; margin:0 auto; display:flex; align-items:center; gap:1.2rem; height:54px; padding:0 1.5rem; }
.logo { font-family:'Cinzel',serif; font-size:1rem; letter-spacing:0.35em; color:#fff; text-decoration:none; flex-shrink:0; text-shadow:0 0 28px rgba(180,185,255,0.35); }
.logo em { font-style:normal; color:rgba(180,185,255,0.55); font-size:0.7em; letter-spacing:0.2em; }
.search-wrap { flex:1; max-width:340px; position:relative; }
.search-wrap input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.42rem 1rem .42rem 2.1rem; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:.8rem; outline:none; transition:border-color .2s; }
.search-wrap input:focus { border-color:rgba(160,170,255,0.3); }
.search-wrap input::placeholder { color:var(--dim); }
.si { position:absolute; left:.65rem; top:50%; transform:translateY(-50%); color:var(--dim); font-size:.78rem; pointer-events:none; }
.view-toggle { display:flex; gap:2px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:3px; margin-left:auto; }
.vbtn { background:none; border:none; color:var(--dim); cursor:pointer; padding:.28rem .52rem; border-radius:4px; font-size:.88rem; transition:all .2s; }
.vbtn.on { background:rgba(160,170,255,0.13); color:#b0b8ff; }
.lang-sw { display:flex; gap:2px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:3px; flex-shrink:0; }
.lbtn { background:none; border:none; color:var(--dim); cursor:pointer; padding:.22rem .45rem; border-radius:4px; font-size:.7rem; letter-spacing:.05em; transition:all .2s; font-family:'Noto Sans JP',sans-serif; }
.lbtn.on { background:rgba(160,170,255,0.13); color:#b0b8ff; }
.layout { max-width:1480px; margin:0 auto; display:flex; position:relative; z-index:1; }
aside { width:200px; flex-shrink:0; padding:1.2rem .9rem 1.2rem 1.3rem; border-right:1px solid var(--border); min-height:calc(100vh - 54px); position:sticky; top:54px; align-self:flex-start; max-height:calc(100vh - 54px); overflow-y:auto; }
aside::-webkit-scrollbar{width:3px;} aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sb-title { font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.2em; color:var(--dim); text-transform:uppercase; margin-bottom:.55rem; padding-bottom:.35rem; border-bottom:1px solid var(--border); }
.sb-sec { margin-bottom:1.6rem; }
.member-pills { display:flex; flex-direction:column; gap:2px; }
.mpill { display:flex; align-items:center; gap:.55rem; width:100%; background:none; border:none; color:var(--dim); cursor:pointer; padding:.36rem .5rem; border-radius:5px; font-family:'Noto Sans JP',sans-serif; font-size:.78rem; text-align:left; transition:all .2s; position:relative; justify-content:space-between; }
.mpill:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.mpill.on { font-weight:500; }
.mpill.on::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:2px; border-radius:2px; background:var(--mc2); }
.mpill[data-m="all"]     { --mc2:#b0b8ff; } .mpill.on[data-m="all"]     { color:#b0b8ff; }
.mpill[data-m="kafu"]    { --mc2:#ffb7c5; } .mpill.on[data-m="kafu"]    { color:#ffb7c5; }
.mpill[data-m="rime"]    { --mc2:#7eb8f7; } .mpill.on[data-m="rime"]    { color:#7eb8f7; }
.mpill[data-m="harusar"] { --mc2:#ff7070; } .mpill.on[data-m="harusar"] { color:#ff7070; }
.mpill[data-m="isekai"]  { --mc2:#f0f0f0; } .mpill.on[data-m="isekai"]  { color:#f0f0f0; }
.mpill[data-m="koko"]    { --mc2:#c084fc; } .mpill.on[data-m="koko"]    { color:#c084fc; }
.mpill[data-m="vwp"]     { --mc2:#c4b5fd; } .mpill.on[data-m="vwp"]     { color:#c4b5fd; }
.mpill-icon { font-size:.95rem; flex-shrink:0; width:20px; text-align:center; }
.mpill-name { flex:1; }
.mpill-cnt { font-size:.65rem; background:var(--surface2); padding:1px 6px; border-radius:10px; color:var(--dim); }
.mpill.on .mpill-cnt { color:inherit; opacity:.7; }
.cfilt { display:flex; align-items:center; justify-content:space-between; width:100%; background:none; border:none; color:var(--dim); cursor:pointer; padding:.32rem .5rem; border-radius:5px; font-family:'Noto Sans JP',sans-serif; font-size:.75rem; text-align:left; transition:all .2s; margin-bottom:2px; }
.cfilt:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.cfilt.on { background:rgba(160,170,255,0.1); color:#c8d0ff; }
.cfilt-label { display:flex; align-items:center; gap:.45rem; flex:1; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.ccnt { font-size:.62rem; background:var(--surface2); padding:1px 5px; border-radius:10px; color:var(--dim); flex-shrink:0; }
.cfilt.on .ccnt { color:#a0aaff; }
.mb-kafu    { background:rgba(255,183,197,.13); color:#ffb7c5; }
.mb-rime    { background:rgba(126,184,247,.13); color:#7eb8f7; }
.mb-harusar { background:rgba(255,112,112,.13); color:#ff7070; }
.mb-isekai  { background:rgba(240,240,240,.1);  color:#e8e8e8; }
.mb-koko    { background:rgba(192,132,252,.13); color:#c084fc; }
.mb-vwp     { background:rgba(196,181,253,.13); color:#c4b5fd; }
.sort-bar { padding:.7rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.7rem; font-size:.76rem; color:var(--dim); }
.sbtn { background:none; border:none; color:var(--dim); cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:.76rem; padding:.18rem .5rem; border-radius:4px; transition:all .2s; }
.sbtn.on { color:#c8d0ff; background:rgba(160,170,255,.1); }
.sbtn:hover:not(.on) { color:var(--text); }
.rcnt { margin-left:auto; font-size:.7rem; }
.content { flex:1; min-width:0; }
.vgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1px; background:var(--border); }
.vcard { background:var(--bg); cursor:pointer; position:relative; transition:background .2s; }
.vcard:hover { background:var(--surface); }
.tw { position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--surface2); }
.tw img { width:100%; height:100%; object-fit:cover; opacity:.82; transition:transform .4s ease,opacity .3s; }
.vcard:hover .tw img { transform:scale(1.04); opacity:1; }
.tov { position:absolute; inset:0; background:linear-gradient(to top,rgba(7,9,14,.65) 0%,transparent 55%); opacity:0; transition:opacity .3s; display:flex; align-items:center; justify-content:center; }
.vcard:hover .tov { opacity:1; }
.pico { width:38px; height:38px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#07090e; font-size:.85rem; padding-left:2px; }
.cbody { padding:.6rem .85rem .7rem; }
.ctitle { font-family:'Shippori Mincho',serif; font-size:.82rem; line-height:1.55; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:.42rem; }
.cmeta { font-size:.66rem; color:var(--dim); display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
.spotify-btn { display:inline-flex; align-items:center; gap:3px; background:rgba(29,185,84,.15); color:#1db954; border:none; border-radius:3px; padding:2px 6px; font-size:.58rem; cursor:pointer; text-decoration:none; transition:background .2s; flex-shrink:0; }
.spotify-btn:hover { background:rgba(29,185,84,.28); }
.vlist { display:flex; flex-direction:column; }
.litem { display:flex; gap:.9rem; padding:.6rem 1.5rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background .2s; text-decoration:none; color:inherit; align-items:center; }
.litem:hover { background:var(--surface); }
.lthumb { width:104px; flex-shrink:0; aspect-ratio:16/9; overflow:hidden; border-radius:3px; background:var(--surface2); }
.lthumb img { width:100%; height:100%; object-fit:cover; opacity:.82; transition:opacity .2s; }
.litem:hover .lthumb img { opacity:1; }
.linfo { flex:1; min-width:0; }
.ltitle { font-family:'Shippori Mincho',serif; font-size:.87rem; color:var(--text); margin-bottom:.28rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lmeta { display:flex; align-items:center; gap:.5rem; font-size:.68rem; color:var(--dim); flex-wrap:wrap; }
.tl { padding:1.2rem 1.4rem; position:relative; }
.tl-line { position:absolute; left:3.15rem; top:0; bottom:0; width:1px; background:var(--border); }
.tl-yr { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.2em; color:var(--dim); margin:1.3rem 0 .65rem 2.5rem; }
.tl-yr:first-child { margin-top:0; }
.tl-row { display:flex; gap:.8rem; margin-bottom:.4rem; position:relative; cursor:pointer; padding:.42rem .45rem; border-radius:6px; transition:background .2s; align-items:flex-start; }
.tl-row:hover { background:var(--surface); }
.tl-dot { width:7px; height:7px; border-radius:50%; background:#b0b8ff; flex-shrink:0; margin-top:.56rem; margin-left:.22rem; position:relative; z-index:1; }
.tl-th { width:90px; flex-shrink:0; aspect-ratio:16/9; overflow:hidden; border-radius:3px; background:var(--surface2); }
.tl-th img { width:100%; height:100%; object-fit:cover; opacity:.78; }
.tl-dt { font-size:.62rem; color:var(--dim); margin-bottom:.12rem; }
.tl-ti { font-size:.78rem; font-family:'Shippori Mincho',serif; color:var(--text); line-height:1.4; }
.pill { display:inline-flex; align-items:center; font-size:.6rem; padding:1px 7px; border-radius:3px; letter-spacing:.02em; white-space:nowrap; background:rgba(160,170,255,.12); color:#a0aaff; }
.dbtn { background:none; border:none; color:var(--dim); cursor:pointer; padding:3px 5px; border-radius:4px; font-size:.7rem; opacity:0; transition:opacity .2s,color .2s; flex-shrink:0; }
.vcard:hover .dbtn,.litem:hover .dbtn,.tl-row:hover .dbtn { opacity:1; }
.dbtn:hover { color:#fca5a5; }
.fab { position:fixed; bottom:1.8rem; right:1.8rem; width:46px; height:46px; border-radius:50%; border:none; cursor:pointer; font-size:1.35rem; display:flex; align-items:center; justify-content:center; background:#b0b8ff; color:#07090e; box-shadow:0 4px 18px rgba(0,0,0,.45); transition:transform .2s,box-shadow .2s; z-index:200; }
.fab:hover { transform:scale(1.1); box-shadow:0 6px 26px rgba(0,0,0,.55); }
.mover { display:none; position:fixed; inset:0; background:rgba(7,9,14,.88); backdrop-filter:blur(10px); z-index:300; align-items:center; justify-content:center; }
.mover.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.7rem; width:90%; max-width:460px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.65); }
.modal h2 { font-family:'Cinzel',serif; font-size:.9rem; letter-spacing:.1em; color:#b0b8ff; margin-bottom:1.3rem; }
.fg { margin-bottom:.85rem; }
.fg label { display:block; font-size:.7rem; color:var(--dim); margin-bottom:.32rem; letter-spacing:.05em; }
.fg input,.fg select,.fg textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:.52rem .8rem; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:.8rem; outline:none; transition:border-color .2s; }
.fg input:focus,.fg select:focus,.fg textarea:focus { border-color:rgba(160,170,255,.3); }
.fg select option { background:var(--surface); }
.frow { display:flex; gap:.7rem; } .frow .fg { flex:1; }
.fa { display:flex; gap:.6rem; justify-content:flex-end; margin-top:1.2rem; }
.btn { padding:.42rem 1rem; border-radius:5px; border:none; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:.8rem; transition:all .2s; }
.btn-p { background:#b0b8ff; color:#07090e; font-weight:600; } .btn-p:hover { opacity:.88; }
.btn-s { background:var(--surface2); color:var(--text); border:1px solid var(--border); } .btn-s:hover { background:var(--surface); }
.tag-input-wrap { display:flex; flex-wrap:wrap; gap:5px; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:.4rem .6rem; min-height:2.2rem; cursor:text; transition:border-color .2s; }
.tag-input-wrap:focus-within { border-color:rgba(160,170,255,.3); }
.tag-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(160,170,255,.15); color:#a0aaff; border-radius:3px; padding:2px 7px; font-size:.72rem; }
.tag-chip button { background:none; border:none; color:#a0aaff; cursor:pointer; padding:0 1px; font-size:.8rem; line-height:1; opacity:.7; }
.tag-chip button:hover { opacity:1; }
.tag-input-wrap input { background:none; border:none; outline:none; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:.8rem; flex:1; min-width:80px; padding:2px 0; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5rem 2rem; color:var(--dim); text-align:center; gap:.4rem; }
.empty-i { font-size:2.2rem; margin-bottom:.4rem; opacity:.3; }
.empty h3 { font-family:'Shippori Mincho',serif; font-weight:400; font-size:.9rem; }
::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(160,170,220,.16);border-radius:3px;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.vcard,.litem,.tl-row{animation:fi .26s ease both;}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="#">V.W.P <em>ARCHIVE</em></a>
    <div class="search-wrap"><span class="si">🔍</span><input type="text" id="searchInput"></div>
    <div class="view-toggle">
      <button class="vbtn on" id="vGrid">⊞</button>
      <button class="vbtn" id="vList">☰</button>
      <button class="vbtn" id="vTl">⊢</button>
    </div>
    <div class="lang-sw">
      <button class="lbtn on" data-lang="ja">JP</button>
      <button class="lbtn" data-lang="en">EN</button>
      <button class="lbtn" data-lang="zh">中文</button>
    </div>
  </div>
</header>
<div class="layout">
  <aside>
    <div class="sb-sec"><div class="sb-title" data-i18n="members">メンバー</div><div class="member-pills" id="memberPills"></div></div>
    <div class="sb-sec"><div class="sb-title" data-i18n="tags">タグ</div><div id="tagFilters"></div></div>
  </aside>
  <div class="content">
    <div class="sort-bar">
      <span data-i18n="sort">並び順:</span>
      <button class="sbtn on" id="sNew" data-i18n="newest">新しい順</button>
      <button class="sbtn" id="sOld" data-i18n="oldest">古い順</button>
      <span class="rcnt" id="rcnt"></span>
    </div>
    <div id="vc"></div>
  </div>
</div>
<button class="fab" id="fab" style="display:none;">＋</button>
<button id="loginBtn" style="position:fixed;bottom:1.8rem;right:1.8rem;width:46px;height:46px;border-radius:50%;border:1px solid var(--border);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--dim);z-index:200;">🔑</button>
<!-- Add Modal -->
<div class="mover" id="mover">
  <div class="modal">
    <h2 data-i18n="addVideo">動画を追加</h2>
    <div class="fg">
      <label>YouTube URL</label>
      <div style="display:flex;gap:6px;">
        <input type="text" id="iUrl" placeholder="https://www.youtube.com/watch?v=..." style="flex:1;">
        <button id="fetchBtn" class="btn btn-s" style="white-space:nowrap;flex-shrink:0;padding:.42rem .75rem;font-size:.75rem;" data-i18n="fetch">取得</button>
      </div>
      <div id="fetchStatus" style="font-size:.7rem;margin-top:.28rem;min-height:.9rem;"></div>
    </div>
    <div id="thumbPreview" style="display:none;margin-bottom:.7rem;border-radius:4px;overflow:hidden;aspect-ratio:16/9;max-width:160px;background:var(--surface2);"><img id="thumbImg" src="" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.9;"></div>
    <div class="fg"><label data-i18n="titleLabel">タイトル</label><input type="text" id="iTitle" placeholder="動画タイトル"></div>
    <div class="fg"><label data-i18n="memberLabel">メンバー</label><select id="iMember"></select></div>
    <div class="fg">
      <label data-i18n="tagsLabel">タグ <span style="color:var(--dim);font-size:.65rem;" data-i18n-sub="tagHint">（#をつけてEnterで追加）</span></label>
      <div class="tag-input-wrap" id="tagInputWrap"><input type="text" id="tagInput" placeholder="#シングル #組曲"></div>
    </div>
    <div class="fg"><label data-i18n="pubdate">公開日</label><input type="date" id="iDate"></div>
    <div class="fg"><label>Spotify URL <span style="color:var(--dim);font-size:.65rem;">(任意)</span></label><input type="text" id="iSpotify" placeholder="https://open.spotify.com/track/..."></div>
    <div class="fg"><label data-i18n="note">メモ</label><textarea id="iNote" rows="2" placeholder="コラボ相手・作曲者など"></textarea></div>
    <div class="fa">
      <button class="btn btn-s" id="mCancel" data-i18n="cancel">キャンセル</button>
      <button class="btn btn-p" id="mSave" data-i18n="addBtn">追加する</button>
    </div>
  </div>
</div>
<!-- Login Modal -->
<div class="mover" id="loginMover">
  <div class="modal" style="max-width:340px;">
    <h2>🔑 <span data-i18n="adminLogin">管理者ログイン</span></h2>
    <p style="font-size:.74rem;color:var(--dim);margin-bottom:1rem;line-height:1.6;" data-i18n="loginDesc">パスワードを入力すると動画の追加・削除ができます。</p>
    <div class="fg"><label data-i18n="password">パスワード</label><input type="password" id="pwInput"></div>
    <div id="pwStatus" style="font-size:.72rem;margin-top:.28rem;min-height:.9rem;"></div>
    <div class="fa">
      <button class="btn btn-s" id="loginCancel" data-i18n="cancel">キャンセル</button>
      <button class="btn btn-p" id="loginSubmit" data-i18n="login">ログイン</button>
    </div>
  </div>
</div>
<script>
const I18N = {
  ja: { members:'メンバー', tags:'タグ', sort:'並び順:', newest:'新しい順', oldest:'古い順', addVideo:'動画を追加', fetch:'取得', titleLabel:'タイトル', memberLabel:'メンバー', tagsLabel:'タグ', tagHint:'（#をつけてEnterで追加）', pubdate:'公開日', note:'メモ', cancel:'キャンセル', addBtn:'追加する', adminLogin:'管理者ログイン', loginDesc:'パスワードを入力すると動画の追加・削除ができます。', password:'パスワード', login:'ログイン', notFound:'動画が見つかりません', fetching:'取得中…', fetchOk:'✓ タイトル・公開日・サムネイルを取得しました', delConfirm:'この動画を削除しますか？', adding:'追加中…', searchPh:'タイトルで検索…', spotify:'Spotify', allTag:'すべて',
    mbr:{ all:'すべて', kafu:'花譜', rime:'理芽', harusar:'春猿火', isekai:'ヰ世界情緒', koko:'幸祜', vwp:'V.W.P' } },
  en: { members:'Members', tags:'Tags', sort:'Sort:', newest:'Newest', oldest:'Oldest', addVideo:'Add Video', fetch:'Fetch', titleLabel:'Title', memberLabel:'Member', tagsLabel:'Tags', tagHint:'(type #tag + Enter)', pubdate:'Publish Date', note:'Notes', cancel:'Cancel', addBtn:'Add', adminLogin:'Admin Login', loginDesc:'Enter password to add/delete videos.', password:'Password', login:'Login', notFound:'No videos found', fetching:'Fetching…', fetchOk:'✓ Loaded title, date & thumbnail', delConfirm:'Delete this video?', adding:'Adding…', searchPh:'Search by title…', spotify:'Spotify', allTag:'All',
    mbr:{ all:'All', kafu:'KAFU', rime:'RIME', harusar:'HARUSARUBI', isekai:'ISEKAI JOCHO', koko:'KOKO', vwp:'V.W.P' } },
  zh: { members:'成员', tags:'标签', sort:'排序:', newest:'最新', oldest:'最旧', addVideo:'添加视频', fetch:'获取', titleLabel:'标题', memberLabel:'成员', tagsLabel:'标签', tagHint:'（输入#标签后按Enter）', pubdate:'发布日期', note:'备注', cancel:'取消', addBtn:'添加', adminLogin:'管理员登录', loginDesc:'输入密码以添加或删除视频。', password:'密码', login:'登录', notFound:'未找到视频', fetching:'获取中…', fetchOk:'✓ 已获取标题、日期和缩略图', delConfirm:'确认删除此视频？', adding:'添加中…', searchPh:'按标题搜索…', spotify:'Spotify', allTag:'全部',
    mbr:{ all:'全部', kafu:'花谱', rime:'理芽', harusar:'春猿火', isekai:'异世界情绪', koko:'幸祜', vwp:'V.W.P' } }
};
let lang = 'ja';
function t(k){ return (I18N[lang]||I18N.ja)[k] || I18N.ja[k] || k; }
function mbr(id){ return (I18N[lang].mbr||I18N.ja.mbr)[id] || id; }
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-sub]').forEach(el=>{ el.textContent = t(el.dataset.i18nSub); });
  document.getElementById('searchInput').placeholder = t('searchPh');
}

const MEMBERS = [
  {id:'all',emoji:'✦'},{id:'kafu',emoji:'🌸'},{id:'rime',emoji:'🌱'},
  {id:'harusar',emoji:'🔥'},{id:'isekai',emoji:'🌼'},{id:'koko',emoji:'⚡️'},{id:'vwp',emoji:'✦'}
];
const MBR_CLS = {kafu:'mb-kafu',rime:'mb-rime',harusar:'mb-harusar',isekai:'mb-isekai',koko:'mb-koko',vwp:'mb-vwp'};

let videos=[],curMember='all',curTag='all',curSort='new',curView='grid',searchQ='',isAdmin=false;
const PW_SK='vwp_admin_pw';
function getStoredPw(){try{return localStorage.getItem(PW_SK)||'';}catch{return '';}}
function storePw(pw){try{localStorage.setItem(PW_SK,pw);}catch{}}

async function loadVideos(){
  try{ const res=await fetch('/api/videos-get'); const d=await res.json(); if(Array.isArray(d)) videos=d; }catch(e){console.error(e);}
}
async function addVideoApi(payload){
  const res=await fetch('/api/videos-add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:getStoredPw(),...payload})});
  const d=await res.json(); if(!res.ok) throw new Error(d.error||'failed'); return d;
}
async function deleteVideoApi(id){
  const res=await fetch('/api/videos-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:getStoredPw(),id})});
  const d=await res.json(); if(!res.ok) throw new Error(d.error||'failed');
}

function ytId(url){const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function thumb(v){const id=ytId(v.url);return id?`https://img.youtube.com/vi/${id}/mqdefault.jpg`:'';}
function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}
function parseTags(v){const raw=v.tags||v.tag||'';return raw.split(/[\s,]+/).map(s=>s.replace(/^#/,'')).filter(Boolean);}
function tagPills(v){return parseTags(v).map(tag=>`<span class="pill">#${tag}</span>`).join('');}
function mbPill(mid){return `<span class="pill ${MBR_CLS[mid]||''}">${mbr(mid)}</span>`;}
function spotifyBtn(v){if(!v.spotify_url)return '';return `<a class="spotify-btn" href="${v.spotify_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">♫ ${t('spotify')}</a>`;}

function filtered(){
  let list=videos.slice();
  if(curMember!=='all') list=list.filter(v=>v.member===curMember);
  if(curTag!=='all') list=list.filter(v=>parseTags(v).includes(curTag));
  if(searchQ) list=list.filter(v=>v.title.includes(searchQ)||(v.note&&v.note.includes(searchQ)));
  list.sort((a,b)=>curSort==='new'?(b.date>a.date?1:-1):(a.date>b.date?1:-1));
  return list;
}
function allTagsOf(src){const s=new Set();src.forEach(v=>parseTags(v).forEach(t=>s.add(t)));return [...s].sort();}

function updateCounts(){
  const srcM=curTag==='all'?videos:videos.filter(v=>parseTags(v).includes(curTag));
  MEMBERS.forEach(m=>{const el=document.getElementById('mc-'+m.id);if(!el)return;el.textContent=m.id==='all'?srcM.length:srcM.filter(v=>v.member===m.id).length;});
  const srcT=curMember==='all'?videos:videos.filter(v=>v.member===curMember);
  const el0=document.getElementById('tc-all');if(el0)el0.textContent=srcT.length;
  allTagsOf(srcT).forEach(tag=>{const el=document.getElementById('tc-'+tag);if(el)el.textContent=srcT.filter(v=>parseTags(v).includes(tag)).length;});
}

function buildSidebar(){
  const mp=document.getElementById('memberPills');
  mp.innerHTML='';
  MEMBERS.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='mpill'+(m.id===curMember?' on':'');
    btn.dataset.m=m.id;
    btn.innerHTML=`<span class="mpill-icon">${m.emoji}</span><span class="mpill-name">${mbr(m.id)}</span><span class="mpill-cnt" id="mc-${m.id}">0</span>`;
    btn.addEventListener('click',()=>{curMember=m.id;curTag='all';buildSidebar();updateCounts();render();});
    mp.appendChild(btn);
  });
  const tf=document.getElementById('tagFilters');
  tf.innerHTML='';
  const src=curMember==='all'?videos:videos.filter(v=>v.member===curMember);
  const tags=allTagsOf(src);
  const allB=document.createElement('button');
  allB.className='cfilt'+(curTag==='all'?' on':'');
  allB.innerHTML=`<span class="cfilt-label">${t('allTag')}</span><span class="ccnt" id="tc-all">0</span>`;
  allB.addEventListener('click',()=>{curTag='all';tf.querySelectorAll('.cfilt').forEach(b=>b.classList.remove('on'));allB.classList.add('on');updateCounts();render();});
  tf.appendChild(allB);
  tags.forEach(tag=>{
    const b=document.createElement('button');
    b.className='cfilt'+(curTag===tag?' on':'');
    b.innerHTML=`<span class="cfilt-label">#${tag}</span><span class="ccnt" id="tc-${tag}">0</span>`;
    b.addEventListener('click',()=>{curTag=tag;tf.querySelectorAll('.cfilt').forEach(x=>x.classList.remove('on'));b.classList.add('on');updateCounts();render();});
    tf.appendChild(b);
  });
}

async function del(id,e){
  e.stopPropagation();e.preventDefault();
  if(!confirm(t('delConfirm')))return;
  try{await deleteVideoApi(id);videos=videos.filter(v=>v.id!==id);buildSidebar();updateCounts();render();}
  catch(err){alert(err.message);}
}

function showMb(v){return curMember==='all'?mbPill(v.member):'';}

function renderGrid(list){
  if(!list.length)return `<div class="empty"><div class="empty-i">🌙</div><h3>${t('notFound')}</h3></div>`;
  return `<div class="vgrid">`+list.map((v,i)=>`
    <div class="vcard" style="animation-delay:${i*.022}s" onclick="window.open('${v.url}','_blank')">
      <div class="tw"><img src="${thumb(v)}" alt="" loading="lazy"><div class="tov"><div class="pico">▶</div></div></div>
      <div class="cbody">
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.38rem">${tagPills(v)}${showMb(v)}</div>
        <div class="ctitle">${v.title}</div>
        <div class="cmeta"><span>${fmtDate(v.date)}</span>${spotifyBtn(v)}${v.note?`<span>${v.note}</span>`:''}${isAdmin?`<button class="dbtn" onclick="del(${v.id},event)">✕</button>`:''}</div>
      </div>
    </div>`).join('')+`</div>`;
}
function renderList(list){
  if(!list.length)return `<div class="empty"><div class="empty-i">🌙</div><h3>${t('notFound')}</h3></div>`;
  return `<div class="vlist">`+list.map((v,i)=>`
    <a class="litem" style="animation-delay:${i*.022}s" href="${v.url}" target="_blank" rel="noopener">
      <div class="lthumb"><img src="${thumb(v)}" alt="" loading="lazy"></div>
      <div class="linfo"><div class="ltitle">${v.title}</div><div class="lmeta">${tagPills(v)}${showMb(v)}<span>${fmtDate(v.date)}</span>${spotifyBtn(v)}${v.note?`<span>${v.note}</span>`:''}</div></div>
      ${isAdmin?`<button class="dbtn" onclick="del(${v.id},event)">✕</button>`:''}
    </a>`).join('')+`</div>`;
}
function renderTimeline(list){
  if(!list.length)return `<div class="empty"><div class="empty-i">🌙</div><h3>${t('notFound')}</h3></div>`;
  let html=`<div class="tl"><div class="tl-line"></div>`,yr='';
  list.forEach((v,i)=>{
    const y=v.date?v.date.slice(0,4):'?';
    if(y!==yr){yr=y;html+=`<div class="tl-yr">${y}</div>`;}
    html+=`<div class="tl-row" style="animation-delay:${i*.022}s" onclick="window.open('${v.url}','_blank')">
      <div class="tl-dot"></div>
      <div class="tl-th"><img src="${thumb(v)}" alt="" loading="lazy"></div>
      <div style="flex:1;min-width:0"><div class="tl-dt">${fmtDate(v.date)}</div><div class="tl-ti">${v.title}</div>
      <div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">${tagPills(v)}${showMb(v)}${spotifyBtn(v)}${v.note?`<span style="font-size:.62rem;color:var(--dim)">${v.note}</span>`:''}</div></div>
      ${isAdmin?`<button class="dbtn" onclick="del(${v.id},event)">✕</button>`:''}
    </div>`;
  });
  return html+'</div>';
}
function render(){
  const list=filtered();
  document.getElementById('rcnt').textContent=list.length+' 件';
  const c=document.getElementById('vc');
  if(curView==='grid') c.innerHTML=renderGrid(list);
  else if(curView==='list') c.innerHTML=renderList(list);
  else c.innerHTML=renderTimeline(list);
}

// tag input
let inputTags=[];
function renderTagChips(){
  const wrap=document.getElementById('tagInputWrap'),inp=document.getElementById('tagInput');
  wrap.querySelectorAll('.tag-chip').forEach(el=>el.remove());
  inputTags.forEach((tag,i)=>{
    const chip=document.createElement('span');chip.className='tag-chip';
    chip.innerHTML=`#${tag}<button onclick="removeInputTag(${i})">×</button>`;
    wrap.insertBefore(chip,inp);
  });
}
function addInputTag(raw){const tag=raw.replace(/^#+/,'').trim();if(!tag||inputTags.includes(tag))return;inputTags.push(tag);renderTagChips();}
function removeInputTag(i){inputTags.splice(i,1);renderTagChips();}
document.getElementById('tagInput').addEventListener('keydown',e=>{
  const val=e.target.value.trim();
  if(e.key==='Enter'||e.key===' '){e.preventDefault();if(val){addInputTag(val);e.target.value='';}}
  else if(e.key==='Backspace'&&!val&&inputTags.length){inputTags.pop();renderTagChips();}
});
document.getElementById('tagInput').addEventListener('blur',e=>{const val=e.target.value.trim();if(val){addInputTag(val);e.target.value='';}});
document.getElementById('tagInputWrap').addEventListener('click',()=>document.getElementById('tagInput').focus());

// events
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.trim();render();});
['vGrid','vList','vTl'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    curView={vGrid:'grid',vList:'list',vTl:'timeline'}[id];
    document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
    document.getElementById(id).classList.add('on');render();
  });
});
document.getElementById('sNew').addEventListener('click',()=>{curSort='new';document.getElementById('sNew').classList.add('on');document.getElementById('sOld').classList.remove('on');render();});
document.getElementById('sOld').addEventListener('click',()=>{curSort='old';document.getElementById('sOld').classList.add('on');document.getElementById('sNew').classList.remove('on');render();});

document.querySelectorAll('.lbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    lang=btn.dataset.lang;
    document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
    applyI18n();buildSidebar();updateCounts();render();
  });
});

document.getElementById('iUrl').addEventListener('input',e=>{
  const vid=ytId(e.target.value.trim());
  const prev=document.getElementById('thumbPreview');
  if(vid){document.getElementById('thumbImg').src=`https://img.youtube.com/vi/${vid}/mqdefault.jpg`;prev.style.display='block';}
  else prev.style.display='none';
});
document.getElementById('fetchBtn').addEventListener('click',async()=>{
  const url=document.getElementById('iUrl').value.trim();
  const status=document.getElementById('fetchStatus');
  if(!ytId(url)){status.textContent='有効なYouTube URLではありません';status.style.color='#fca5a5';return;}
  status.textContent=t('fetching');status.style.color='var(--dim)';
  try{
    const res=await fetch(`/api/youtube?id=${ytId(url)}`);const info=await res.json();
    if(info.error)throw new Error(info.error);
    if(info.title)document.getElementById('iTitle').value=info.title;
    if(info.date)document.getElementById('iDate').value=info.date;
    if(info.thumb){document.getElementById('thumbImg').src=info.thumb;document.getElementById('thumbPreview').style.display='block';}
    status.textContent=t('fetchOk');status.style.color='#6ee7b7';
  }catch(e){status.textContent='Error: '+e.message;status.style.color='#fca5a5';}
});

document.getElementById('fab').addEventListener('click',()=>{inputTags=[];renderTagChips();document.getElementById('mover').classList.add('open');});
document.getElementById('mCancel').addEventListener('click',()=>document.getElementById('mover').classList.remove('open'));
document.getElementById('mover').addEventListener('click',e=>{if(e.target===document.getElementById('mover'))document.getElementById('mover').classList.remove('open');});

document.getElementById('mSave').addEventListener('click',async()=>{
  const url=document.getElementById('iUrl').value.trim();
  const title=document.getElementById('iTitle').value.trim();
  const member=document.getElementById('iMember').value;
  const date=document.getElementById('iDate').value;
  const spotify=document.getElementById('iSpotify').value.trim();
  const note=document.getElementById('iNote').value.trim();
  const rawInput=document.getElementById('tagInput').value.trim();
  if(rawInput)addInputTag(rawInput);
  const tags=inputTags.join(' ');
  if(!url||!title){alert('URLとタイトルは必須です');return;}
  const saveBtn=document.getElementById('mSave');
  saveBtn.textContent=t('adding');saveBtn.disabled=true;
  try{
    const nv=await addVideoApi({member,title,tags,date,url,note,spotify_url:spotify});
    videos.unshift(nv);
    document.getElementById('mover').classList.remove('open');
    ['iUrl','iTitle','iDate','iNote','iSpotify'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('thumbPreview').style.display='none';
    inputTags=[];renderTagChips();
    buildSidebar();updateCounts();render();
  }catch(err){alert(err.message);}
  finally{saveBtn.textContent=t('addBtn');saveBtn.disabled=false;}
});

function buildMemberSelect(){
  document.getElementById('iMember').innerHTML=MEMBERS.filter(m=>m.id!=='all').map(m=>`<option value="${m.id}">${mbr(m.id)}</option>`).join('');
}

function setAdminMode(on){
  isAdmin=on;
  document.getElementById('fab').style.display=on?'flex':'none';
  document.getElementById('loginBtn').style.display=on?'none':'flex';
  render();
}

document.getElementById('loginBtn').addEventListener('click',()=>{
  document.getElementById('pwInput').value='';document.getElementById('pwStatus').textContent='';
  document.getElementById('loginMover').classList.add('open');
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
});
document.getElementById('loginCancel').addEventListener('click',()=>document.getElementById('loginMover').classList.remove('open'));
document.getElementById('loginMover').addEventListener('click',e=>{if(e.target===document.getElementById('loginMover'))document.getElementById('loginMover').classList.remove('open');});

async function verifyPw(pw){
  const res=await fetch("/api/auth-check",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
  return res.ok;
}
document.getElementById('loginSubmit').addEventListener('click',async()=>{
  const pw=document.getElementById('pwInput').value;
  const status=document.getElementById('pwStatus');
  status.textContent='確認中…';status.style.color='var(--dim)';
  try{
    const ok=await verifyPw(pw);
    if(!ok){status.textContent='パスワードが違います';status.style.color='#fca5a5';return;}
    storePw(pw);setAdminMode(true);document.getElementById('loginMover').classList.remove('open');
  }catch(e){status.textContent='Error: '+e.message;status.style.color='#fca5a5';}
});
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginSubmit').click();});

(async()=>{
  applyI18n();
  await loadVideos();
  buildSidebar();buildMemberSelect();updateCounts();render();
  const savedPw=getStoredPw();
  if(savedPw){try{const ok=await verifyPw(savedPw);if(ok)setAdminMode(true);}catch{}}
})();
</script>
</body>
</html>
